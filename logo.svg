<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 150" width="420" height="150">
  <defs>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="50%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#673AB7"/>
    </linearGradient>
  </defs>

  <!-- Three concentric activity ring arcs (Apple Watch inspired) -->
  <!-- Move ring (outer) -->
  <path d="M95,75 m-42,0 a42,42 0 1,1 72,30" fill="none" stroke="#E91E63" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
  <!-- Exercise ring (middle) -->
  <path d="M95,75 m-30,0 a30,30 0 1,1 55,16" fill="none" stroke="#4CAF50" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
  <!-- Stand ring (inner) -->
  <path d="M95,75 m-18,0 a18,18 0 1,1 34,6" fill="none" stroke="#673AB7" stroke-width="7" stroke-linecap="round" opacity="0.85"/>

  <!-- Pulse tick in the center of the rings -->
  <polyline
    points="80,75 86,75 89,68 93,80 97,60 101,75 108,75"
    fill="none"
    stroke="url(#pulse)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Text -->
  <text x="160" y="82" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="54" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#E91E63">vital</tspan><tspan fill="#673AB7">og</tspan>
  </text>

  <!-- Tagline -->
  <text x="162" y="110" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#9CA3AF" letter-spacing="2.5" font-weight="500">
    HEALTH DATA CLI
  </text>
</svg>
